---
# Play 1: Provision Titan Defense Infrastructure (Blue Team)
- name: Provision Titan Defense Infrastructure
  hosts: defense
  become: true
  # Vars are auto-loaded from group_vars/defense.yml

  roles:
    - { role: common, tags: ['common'] }
    - { role: security, tags: ['security'] }
    - { role: docker, tags: ['docker'] }
    - { role: security_stack, tags: ['security', 'wazuh'] }
    - { role: media, tags: ['media'] }
    - { role: proxy, tags: ['proxy'] }
    - { role: suricata_nids, tags: ['nids'] }

# Play 2: Provision Red Team Attack Platform
- name: Provision Red Team Attack Platform
  hosts: attack_platform
  become: true

  roles:
    - { role: attack_base, tags: ['attack'] }
